<style>
  :root{
    --void:#05070a;
    --panel:#0b1210;
    --panel-2:#0f1713;
    --line:#1c2b23;
    --neon:#00ff88;
    --neon-dim:#00c96b;
    --moss:#4d8139;
    --ink:#eef4f0;
    --muted:#8ea297;
    --danger:#ff6b6b;
    --radius:16px;
    --font-display:'Baloo 2', system-ui, sans-serif;
    --font-body:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  #alien-root{
    position:relative;
    background:
      radial-gradient(ellipse at 18% -10%, rgba(0,255,136,.10), transparent 45%),
      radial-gradient(ellipse at 100% 0%, rgba(77,129,57,.14), transparent 40%),
      var(--void);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    padding:48px 18px 80px;
    overflow-x:hidden;
  }
  #stars{position:absolute; inset:0; pointer-events:none; z-index:0;}
  .star{position:absolute; width:2px; height:2px; background:#bfe; border-radius:50%; opacity:.5; animation:twinkle 4s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.15;} 50%{opacity:.8;}}

  .wrap{position:relative; z-index:1; max-width:660px; margin:0 auto;}

  .brand{display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:34px; text-align:center;}
  .brand img{width:52px; height:52px; filter:drop-shadow(0 0 14px rgba(0,255,136,.6));}
  .brand .word{font-family:var(--font-display); font-weight:800; font-size:15px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase;}
  .brand h1{font-family:var(--font-display); font-weight:700; font-size:clamp(24px,5vw,32px); margin:2px 0 0; line-height:1.15;}
  .brand h1 span{color:var(--neon); text-shadow:0 0 18px rgba(0,255,136,.55);}
  .brand p{font-family:var(--font-body); color:var(--muted); font-size:14.5px; max-width:460px; margin:6px 0 0; line-height:1.5;}

  /* stepper */
  .stepper{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:30px; gap:4px;}
  .step{flex:1; text-align:center; position:relative;}
  .step .dot{
    width:34px; height:34px; margin:0 auto 8px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:13px;
    background:var(--panel); border:2px solid var(--line); color:var(--muted);
    transition:all .35s ease; position:relative; z-index:2;
  }
  .step .bar{position:absolute; top:17px; left:calc(-50% + 17px); width:calc(100% - 34px); height:2px; background:var(--line); z-index:1;}
  .step:first-child .bar{display:none;}
  .step .label{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600;}
  .step.active .dot{border-color:var(--neon); color:var(--neon); box-shadow:0 0 16px rgba(0,255,136,.5);}
  .step.active .label{color:var(--ink);}
  .step.done .dot{background:var(--neon); border-color:var(--neon); color:#03130a;}
  .step.done .bar{background:var(--neon);}

  /* card */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:30px 26px 26px;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.02);
  }
  .stage-eyebrow{font-family:var(--font-display); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--neon); font-weight:700; margin:0 0 4px;}
  .stage-title{font-family:var(--font-display); font-weight:700; font-size:22px; margin:0 0 6px;}
  .stage-sub{color:var(--muted); font-size:13.5px; margin:0 0 22px; line-height:1.5;}

  .field{margin-bottom:20px;}
  .field label{display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--ink);}
  .field .hint{display:block; font-weight:400; color:var(--muted); font-size:12px; margin-top:4px;}
  .field input[type=text], .field input[type=email], .field input[type=tel], .field input[type=date], .field textarea{
    width:100%; background:#070b09; border:1px solid var(--line); border-radius:10px;
    padding:11px 13px; color:var(--ink); font-family:var(--font-body); font-size:14px;
    transition:border-color .2s, box-shadow .2s;
  }
  .field input::placeholder, .field textarea::placeholder{color:#556158;}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--neon); box-shadow:0 0 0 3px rgba(0,255,136,.15);}
  .field textarea{resize:vertical; min-height:78px; font-family:var(--font-body);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){.row2{grid-template-columns:1fr;}}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    padding:8px 14px; border-radius:999px; border:1px solid var(--line); background:#070b09;
    font-size:13px; color:var(--muted); cursor:pointer; user-select:none; transition:all .18s;
  }
  .chip:hover{border-color:var(--moss); color:var(--ink);}
  .chip.on{background:rgba(0,255,136,.12); border-color:var(--neon); color:var(--neon); box-shadow:0 0 12px rgba(0,255,136,.2);}

  /* niche grid */
  #nicheSearch{margin-bottom:10px;}
  .niche-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; max-height:340px; overflow-y:auto; padding-right:2px;}
  @media (min-width:480px){.niche-grid{grid-template-columns:repeat(3, 1fr);}}
  .niche-grid::-webkit-scrollbar{width:6px;}
  .niche-grid::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
  .niche-card{
    display:flex; align-items:center; gap:8px; padding:10px 11px; border-radius:11px;
    border:1px solid var(--line); background:#070b09; cursor:pointer; transition:all .18s;
    font-size:12.5px; color:var(--muted); line-height:1.25;
  }
  .niche-card .emoji{font-size:16px; flex-shrink:0;}
  .niche-card:hover{border-color:var(--moss); color:var(--ink);}
  .niche-card.on{background:rgba(0,255,136,.12); border-color:var(--neon); color:var(--neon); box-shadow:0 0 12px rgba(0,255,136,.22);}
  .niche-card.hide{display:none;}

  .colorset{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .colorset .swatch{border:1px solid var(--line); border-radius:12px; padding:10px; text-align:center; background:#070b09;}
  .colorset .swatch label{font-size:11px; color:var(--muted); font-weight:600;}
  .colorset input[type=color]{-webkit-appearance:none; appearance:none; width:100%; height:40px; border:none; background:none; border-radius:8px; margin-top:8px; cursor:pointer;}
  .colorset input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
  .colorset input[type=color]::-webkit-color-swatch{border-radius:8px; border:1px solid var(--line);}

  .navrow{display:flex; justify-content:space-between; align-items:center; margin-top:28px; gap:12px;}
  .btn{
    font-family:var(--font-display); font-weight:700; font-size:14px; letter-spacing:.02em;
    border-radius:999px; padding:13px 24px; cursor:pointer; border:1px solid transparent; transition:all .2s;
  }
  .btn-ghost{background:transparent; border-color:var(--line); color:var(--muted);}
  .btn-ghost:hover{color:var(--ink); border-color:var(--muted);}
  .btn-primary{background:var(--neon); color:#03130a; box-shadow:0 0 22px rgba(0,255,136,.35);}
  .btn-primary:hover{background:#22ffa0; box-shadow:0 0 30px rgba(0,255,136,.55);}
  .btn-primary:disabled{opacity:.4; cursor:not-allowed; box-shadow:none;}
  .btn-pay{
    width:100%; margin-top:6px; background:linear-gradient(135deg, var(--neon), #00c96b);
    color:#03130a; box-shadow:0 0 24px rgba(0,255,136,.4); font-size:14.5px;
  }
  .btn-pay:hover{box-shadow:0 0 34px rgba(0,255,136,.6);}
  .btn-pay:disabled{opacity:.55; cursor:wait;}
  .pay-block{border-top:1px solid var(--line); padding-top:18px; margin-top:6px;}

  /* stage 5: choice screen */
  .choice-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){.choice-grid{grid-template-columns:1fr;}}
  .choice-card{
    background:#070b09; border:1px solid var(--line); border-radius:14px; padding:22px 18px;
    text-align:center; cursor:pointer; transition:all .2s;
  }
  .choice-card:hover{border-color:var(--neon); box-shadow:0 0 20px rgba(0,255,136,.2); transform:translateY(-2px);}
  .choice-emoji{font-size:30px; margin-bottom:10px;}
  .choice-emoji .cifrao{
    font-family:var(--font-display); font-weight:800; color:var(--neon);
    text-shadow:0 0 14px rgba(0,255,136,.7), 0 0 26px rgba(0,255,136,.4);
  }
  .choice-title{font-family:var(--font-display); font-weight:700; font-size:16px; margin-bottom:6px;}
  .choice-sub{color:var(--muted); font-size:12.5px; line-height:1.5;}

  /* stage 5: plans */
  .plans-grid{display:grid; grid-template-columns:1fr; gap:16px;}
  .plan-card{
    background:#070b09; border:1px solid var(--line); border-radius:14px; padding:22px 20px; position:relative;
  }
  .plan-card.featured{border-color:var(--neon); background:linear-gradient(180deg, rgba(0,255,136,.08), #070b09); box-shadow:0 0 24px rgba(0,255,136,.15);}
  .plan-tag{
    position:absolute; top:-11px; left:50%; transform:translateX(-50%);
    background:var(--neon); color:#03130a; font-family:var(--font-display); font-weight:700;
    font-size:10.5px; letter-spacing:.04em; padding:4px 12px; border-radius:999px; text-transform:uppercase;
  }
  .plan-name{font-family:var(--font-display); font-weight:700; font-size:17px; margin-bottom:6px;}
  .plan-desc{color:var(--muted); font-size:12.5px; line-height:1.5; margin-bottom:12px;}
  .plan-price{font-family:var(--font-display); font-weight:800; font-size:22px; color:var(--neon); margin-bottom:14px;}
  .plan-price span{font-family:var(--font-body); font-weight:400; font-size:12px; color:var(--muted);}
  .plan-features{list-style:none; padding:0; margin:0 0 16px; display:flex; flex-direction:column; gap:7px;}
  .plan-features li{font-size:12.5px; color:#c7d2cb;}

  /* stage 5: sent screen */
  .sent-screen{text-align:center; padding:24px 6px 6px;}
  .sent-emoji{font-size:46px; margin-bottom:14px; filter:drop-shadow(0 0 16px rgba(0,255,136,.5));}
  .sent-title{font-family:var(--font-display); font-weight:700; font-size:19px; color:var(--neon); margin-bottom:10px; line-height:1.3;}
  .sent-sub{color:var(--muted); font-size:13.5px; line-height:1.6; max-width:380px; margin:0 auto;}
  .fallback-link{color:var(--neon); font-weight:600; text-decoration:underline;}

  .required{color:var(--danger); margin-left:2px;}
  .err{font-size:12px; color:var(--danger); margin-top:5px; display:none;}
  .field.invalid input, .field.invalid textarea{border-color:var(--danger);}
  .field.invalid .err{display:block;}
  .niche-grid.invalid{outline:1px solid var(--danger); border-radius:12px;}

  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--panel); border:1px solid var(--neon); color:var(--ink); padding:12px 20px;
    border-radius:10px; font-size:13px; opacity:0; pointer-events:none; transition:all .3s; z-index:10;
    box-shadow:0 0 20px rgba(0,255,136,.3); max-width:88vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .foot{text-align:center; color:#4d5c53; font-size:11.5px; margin-top:26px; letter-spacing:.03em;}
</style>

<script>
(function(){
  const root = document.getElementById('alien-root');

  // starfield
  const starsHost = root.querySelector('#stars');
  for(let i=0;i<50;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';

  // ---------------------------------------------------------------------

    {key:'psicologia', emoji:'🧠', label:'Psicologia',

      q1:'Quais abordagens e tipos de atendimento você oferece?', q1ph:'Ex.: TCC, psicanálise, online ou presencial...',

  async function enviarEmailBriefing(a, n, msg){
    if(!WEB3FORMS_ACCESS_KEY || WEB3FORMS_ACCESS_KEY.indexOf('coloque_') === 0) return;
    const nicheName = n ? n.label : (a.nicho_outro || 'não informado');
    const payload = {
      access_key: WEB3FORMS_ACCESS_KEY,
      subject: 'Novo Briefing — ' + nicheName + (a.nome ? ' · ' + a.nome : ''),
      from_name: a.nome || 'Formulário Alien',
      email: a.email || undefined,
      message: msg.replace(/\*/g, '')
    };
    try{
      await fetch('https://api.web3forms.com/submit', {
        method:'POST',
        headers:{'Content-Type':'application/json', Accept:'application/json'},
        body: JSON.stringify(payload)
      });
    } catch(e){ /* falha silenciosa — o WhatsApp continua sendo o caminho principal */ }
  }

      'Não apareceu nada? O navegador pode ter bloqueado o pop-up. <a class="fallback-link" href="'+lastPlanUrl+'" target="_blank" rel="noopener">Clique aqui para abrir o pagamento</a>.'
    );
    if(paymentView === 'sent_plan_fail') return sentScreenHTML(
      'Suas informações já estão com a gente! Tivemos uma instabilidade ao gerar o pagamento automático do plano <strong>'+lastPlanName+'</strong> — vamos te enviar o link de pagamento em instantes pelo WhatsApp ou e-mail.'
    );
    return choiceHTML();
  }

  const STAGE_BUILDERS = [stage1HTML, stage2HTML, stage3HTML, stage4HTML, stage5HTML];

  let current = 0;
  const answers = {};

  const stepperHost = document.getElementById('stepper');
  const stagesHost = document.getElementById('stagesHost');
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');
  const toast = document.getElementById('toast');

  function renderStepper(){
    stepperHost.innerHTML = STAGES.map((s,i)=>`
      <div class="step ${i===current?'active':''} ${i<current?'done':''}">
        <div class="bar"></div>
        <div class="dot">${i<current?'✓':('0'+(i+1))}</div>
        <div class="label">${s.label}</div>
      </div>`).join('');
  }

  function wireChips(){
    stagesHost.querySelectorAll('.chip').forEach(chip=>{
      const key = chip.dataset.name+'::'+chip.dataset.value;
      if(answers.__chips && answers.__chips[key]) chip.classList.add('on');
      chip.addEventListener('click', ()=>{
        const multi = chip.dataset.multi === '1';
        if(!multi){
          stagesHost.querySelectorAll(`.chip[data-name="${chip.dataset.name}"]`).forEach(c=>{
            c.classList.remove('on');
            delete (answers.__chips||{})[c.dataset.name+'::'+c.dataset.value];
          });
        }
        chip.classList.toggle('on');
        answers.__chips = answers.__chips || {};
        const k = chip.dataset.name+'::'+chip.dataset.value;
        if(chip.classList.contains('on')) answers.__chips[k]=true; else delete answers.__chips[k];
      });
    });
  }

  function wireNicheGrid(){
    const grid = document.getElementById('nicheGrid');
    if(!grid) return;
    grid.querySelectorAll('.niche-card').forEach(card=>{
      if(card.dataset.key === answers.nicho_key) card.classList.add('on');
      card.addEventListener('click', ()=>{
        grid.querySelectorAll('.niche-card').forEach(c=>c.classList.remove('on'));
        card.classList.add('on');
        answers.nicho_key = card.dataset.key;
        grid.classList.remove('invalid');
        const outroWrap = document.getElementById('nicheOutroWrap');
        outroWrap.style.display = card.dataset.key === 'outro' ? 'block' : 'none';
      });
    });
    const search = document.getElementById('nicheSearch');
    search.addEventListener('input', ()=>{
      const q = search.value.trim().toLowerCase();
      grid.querySelectorAll('.niche-card').forEach(c=>{
        const txt = c.textContent.toLowerCase();
        c.classList.toggle('hide', q.length>0 && !txt.includes(q));
      });
    });
    if(answers.nicho_key === 'outro'){
      document.getElementById('nicheOutroWrap').style.display = 'block';
    }
  }

  async function gerarLinkInfinitePay(valorReais, descricao){
    const priceCents = Math.round(parseFloat(String(valorReais).replace(/\./g,'').replace(',', '.')) * 100);
    if(!priceCents || priceCents <= 0) throw new Error('valor inválido');
    const res = await fetch('/api/create-payment-link', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ price: priceCents, description: descricao || 'Projeto Alien Marketing Inteligente' })
    });
    const data = await res.json();
    if(!res.ok || !data.url) throw new Error(data.error || 'falha na API');
    return data.url;
  }

  async function finalizarEnvio(opts){
    saveStageValues();
    const n = getNiche();
    let msg = buildMessage();
    msg += '\n\n*Decisão final*\n';
    msg += opts.modo === 'plano'
      ? ('Optou por: Escolher Plano — ' + opts.plano.name + ' (' + opts.plano.priceLabel + ')')
      : 'Optou por: Enviar informações (decidir depois)';
    await enviarEmailBriefing(answers, n, msg);
    if(opts.modo === 'plano'){
      try{
        const url = await gerarLinkInfinitePay(opts.plano.price, opts.plano.name + ' — ' + (n?n.label:'Projeto Alien'));
        return url;
      } catch(e){
        console.error('[Alien] Falha ao gerar link InfinitePay:', e);
        return null;
      }
    }
    return null;
  }

  function updateNavButtons(){
    if(current !== STAGES.length-1){
      btnBack.style.visibility = current===0 ? 'hidden' : 'visible';
      btnNext.style.display = 'inline-block';
      btnNext.textContent = 'Avançar';
      return;
    }
    btnNext.style.display = 'none';
    if(paymentView === 'choice') btnBack.style.visibility = 'visible';
    else btnBack.style.visibility = 'hidden';
  }

  function rerenderStage5(){
    stagesHost.querySelector('#stagesInner').innerHTML = stage5HTML();
    wirePaymentStage();
    updateNavButtons();
  }

  function wirePaymentStage(){
    if(paymentView === 'choice'){
      document.getElementById('choicePlano').addEventListener('click', ()=>{
        paymentView = 'plans';
        rerenderStage5();
      });
      document.getElementById('choiceInfo').addEventListener('click', async ()=>{
        const card = document.getElementById('choiceInfo');
        card.style.opacity = '.6'; card.style.pointerEvents = 'none';
        await finalizarEnvio({modo:'info'});
        paymentView = 'sent_info';
        rerenderStage5();
      });
    } else if(paymentView === 'plans'){
      document.getElementById('backToChoice').addEventListener('click', ()=>{
        paymentView = 'choice';
        rerenderStage5();
      });
      stagesHost.querySelectorAll('.plan-select-btn').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const plano = PLANS.find(p=>p.key === btn.dataset.key);
          btn.disabled = true;
          btn.textContent = 'Processando...';
          // abre a aba já no clique (gesto síncrono do usuário), antes de qualquer await —
          // isso evita que o navegador bloqueie o pop-up depois das chamadas de rede.
          const paymentWindow = window.open('', '_blank');
          const url = await finalizarEnvio({modo:'plano', plano});
          lastPlanName = plano.name;
          if(url){
            lastPlanUrl = url;
            if(paymentWindow){ paymentWindow.location.href = url; }
            else { window.open(url, '_blank'); }
            paymentView = 'sent_plan_ok';
          } else {
            if(paymentWindow) paymentWindow.close();
            paymentView = 'sent_plan_fail';
          }
          rerenderStage5();
        });
      });
    }
  }

  function renderStage(){
    const s = STAGES[current];
    stagesHost.innerHTML = `
      <div class="stage-eyebrow">${s.eyebrow}</div>
      <div class="stage-title">${s.title}</div>
      <div class="stage-sub">${s.sub}</div>
      <div id="stagesInner">${STAGE_BUILDERS[current]()}</div>
    `;
    stagesHost.querySelectorAll('input, textarea').forEach(el=>{
      if(answers[el.name] !== undefined) el.value = answers[el.name];
    });
    wireChips();
    if(current === 0) wireNicheGrid();
    if(current === STAGES.length-1) wirePaymentStage();

    updateNavButtons();
  }

  function saveStageValues(){
    stagesHost.querySelectorAll('input, textarea').forEach(el=>{ answers[el.name] = el.value; });
  }

  function validateStage(){
    let ok = true;
    if(current === 0){
      const nome = stagesHost.querySelector('[name=nome]');
      const wpp = stagesHost.querySelector('[name=whatsapp]');
      [nome, wpp].forEach(el=>{
        const field = el.closest('.field');
        if(!el.value.trim()){ field.classList.add('invalid'); ok=false; }
        else field.classList.remove('invalid');
      });
      const grid = document.getElementById('nicheGrid');
      const nicheErr = document.getElementById('nicheErr');
      if(!answers.nicho_key){
        grid.classList.add('invalid');
        nicheErr.style.display = 'block';
        ok = false;
      } else {
        grid.classList.remove('invalid');
        nicheErr.style.display = 'none';
      }
    }
    return ok;
  }

  function chipValues(prefix){
    if(!answers.__chips) return [];
    return Object.keys(answers.__chips)
      .filter(k=>k.startsWith(prefix+'::'))
      .map(k=>k.split('::')[1]);
  }

  function buildMessage(){
    const a = answers;
    const n = getNiche();
    const nicheName = n ? n.label : (a.nicho_outro || 'não informado');
    const lines = [];
    lines.push('*Novo Briefing — Landing Page*');
    lines.push('_via site Alien Marketing Inteligente_');
    lines.push('');
    lines.push('*Abdução*');
    lines.push('Nicho: '+nicheName);
    if(a.nome) lines.push('Nome: '+a.nome);
    if(a.empresa) lines.push('Negócio/marca: '+a.empresa);
    if(a.whatsapp) lines.push('WhatsApp: '+a.whatsapp);
    if(a.email) lines.push('E-mail: '+a.email);
    if(a.instagram) lines.push('Instagram: '+a.instagram);
    if(a.cidades) lines.push('Cidades: '+a.cidades);
    if(a.diferencial) lines.push('Diferencial: '+a.diferencial);
    lines.push('');
    lines.push('*Alinhamento Alien*');
    if(chipValues('objetivo').length) lines.push('Objetivo: '+chipValues('objetivo').join(', '));
    if(a.cta) lines.push('CTA principal: '+a.cta);
    if(a.publico) lines.push('Público-alvo: '+a.publico);
    if(chipValues('identidade').length) lines.push('Identidade visual: '+chipValues('identidade').join(', '));
    if(a.cor_primaria) lines.push('Cores: '+a.cor_primaria+' / '+a.cor_secundaria+' / '+a.cor_apoio);
    if(chipValues('sensacao').length) lines.push('Sensação desejada: '+chipValues('sensacao').join(', '));
    lines.push('');
    lines.push('*Desenvolvimento ('+nicheName+')*');
    if(chipValues('especialidades').length) lines.push('Especialidades: '+chipValues('especialidades').join(', '));
    if(a.q1) lines.push((n?n.q1:'Serviços')+': '+a.q1);
    if(a.q2) lines.push((n?n.q2:'Dúvidas comuns')+': '+a.q2);
    if(chipValues('secoes').length) lines.push('Seções: '+chipValues('secoes').join(', '));
    if(chipValues('materiais').length) lines.push('Materiais disponíveis: '+chipValues('materiais').join(', '));
    if(a.referencias) lines.push('Referências: '+a.referencias);
    if(a.evitar) lines.push('Evitar: '+a.evitar);
    lines.push('');
    lines.push('*Evolução Alien*');
    if(chipValues('dominio').length) lines.push('Domínio: '+chipValues('dominio').join(', '));
    if(a.prazo) lines.push('Prazo: '+a.prazo);
    if(a.orcamento) lines.push('Orçamento: '+a.orcamento);
    if(a.obs) lines.push('Observações: '+a.obs);
    return lines.join('\n');
  }

  btnNext.addEventListener('click', ()=>{
    saveStageValues();
    if(!validateStage()) return;
    if(current < STAGES.length-1){
      current++;
      if(current === STAGES.length-1) paymentView = 'choice';
      renderStepper();
      renderStage();
      document.getElementById('alienForm').scrollIntoView({behavior:'smooth', block:'start'});
    }
  });

  btnBack.addEventListener('click', ()=>{
    saveStageValues();
    if(current === STAGES.length-1 && paymentView !== 'choice'){
      paymentView = 'choice';
      rerenderStage5();
      return;
    }
    if(current>0){ current--; renderStepper(); renderStage(); }
  });

  function showToast(text){
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 3200);
  }

  renderStepper();
  renderStage();
})();
</script>
